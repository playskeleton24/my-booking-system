<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>預約服務 - 專業時段選擇</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%); }
        .time-slot { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .time-slot.active { background-color: #4f46e5; color: white; border-color: #4f46e5; transform: scale(1.02); box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.3); }
        .time-slot.disabled { background-color: #f1f5f9; color: #cbd5e1; border-color: #e2e8f0; cursor: not-allowed; pointer-events: none; text-decoration: line-through; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .tab-active { border-bottom: 2px solid #4f46e5; color: #4f46e5; }
    </style>
</head>
<body class="min-h-screen text-slate-800 relative">

    <div class="h-2 bg-indigo-600"></div>

    <!-- Tab 導航 -->
    <nav class="max-w-2xl mx-auto flex border-b border-slate-200 mt-4 px-4 bg-white/50 backdrop-blur rounded-t-xl">
        <button id="tab-client-btn" class="flex-1 py-4 font-bold tab-active">客戶預約</button>
        <button id="tab-admin-btn" class="flex-1 py-4 font-bold text-slate-400">管理者登入</button>
    </nav>

    <div class="max-w-2xl mx-auto px-4 py-8">
        
        <!-- 客戶預約區塊 -->
        <section id="client-view" class="block space-y-6">
            <header class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-900 mb-2">預約諮詢服務</h1>
                <p class="text-slate-500">選擇您方便的時間，我們將為您保留時段。</p>
            </header>

            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100">
                <div class="p-8 border-b border-slate-50">
                    <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">步驟 1. 選擇日期</label>
                    <input type="date" id="bookingDate" class="w-full text-lg font-medium p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-indigo-500 transition-all outline-none">
                </div>

                <div class="p-8">
                    <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-wider mb-4">步驟 2. 選擇時段</label>
                    <div id="slotsContainer" class="grid grid-cols-2 gap-3 max-h-72 overflow-y-auto pr-2 custom-scrollbar">
                        <div class="col-span-2 py-8 text-center text-slate-400 italic">正在載入時段...</div>
                    </div>
                </div>

                <div id="confirmForm" class="hidden p-8 bg-slate-50 border-t border-slate-100 space-y-4">
                    <label class="flex items-center gap-2 text-sm font-bold text-slate-400 uppercase tracking-wider mb-2">步驟 3. 填寫聯繫資訊</label>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <input type="text" id="userName" placeholder="您的姓名" class="p-3 rounded-xl border-slate-200 focus:ring-indigo-500 border outline-none">
                        <input type="tel" id="userPhone" placeholder="聯絡電話" class="p-3 rounded-xl border-slate-200 focus:ring-indigo-500 border outline-none">
                    </div>
                    <button id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg shadow-indigo-100">立即預約</button>
                </div>
            </div>

            <div id="my-bookings-container" class="bg-indigo-50/50 rounded-3xl p-6 border border-indigo-100 hidden">
                <h3 class="text-sm font-bold text-indigo-900 uppercase tracking-wider mb-4">我的當日預約 (點擊可取消)</h3>
                <div id="myBookingsList" class="space-y-3"></div>
            </div>
        </section>

        <!-- 管理者後台區塊 -->
        <section id="admin-view" class="hidden">
            <header class="mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-2xl font-bold text-slate-900">管理者後台</h2>
                    <button id="logout-admin" class="text-xs text-indigo-600 underline">切換回客戶端</button>
                </div>
                <div class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full text-xs font-bold">已驗證</div>
            </header>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6">
                <div class="flex items-center justify-between mb-6 border-b pb-4">
                    <span class="font-bold text-slate-700">所有預約紀錄</span>
                    <span id="totalBookings" class="text-sm bg-slate-100 px-2 py-1 rounded text-slate-500">0 筆資料</span>
                </div>
                <div id="adminListContainer" class="space-y-4 max-h-[500px] overflow-y-auto pr-2 custom-scrollbar"></div>
            </div>
        </section>

    </div>

    <!-- 成功通知 -->
    <div id="successModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4 text-3xl">✓</div>
            <h3 class="text-xl font-bold mb-2">預約成功！</h3>
            <p id="successMsg" class="text-slate-500 mb-6"></p>
            <button id="closeModalBtn" class="w-full bg-slate-900 text-white py-3 rounded-xl font-medium">確定</button>
        </div>
    </div>

    <!-- 管理員密碼輸入彈窗 -->
    <div id="adminAuthModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-4 text-slate-900">管理者驗證</h3>
            <input type="password" id="adminPassInput" placeholder="請輸入管理密碼" class="w-full p-3 mb-4 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-indigo-500">
            <div class="flex gap-2">
                <button id="cancelAuthBtn" class="flex-1 bg-slate-100 py-3 rounded-xl">取消</button>
                <button id="confirmAuthBtn" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl">登入</button>
            </div>
        </div>
    </div>

    <!-- 自訂 Alert -->
    <div id="customAlertModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full text-center shadow-2xl">
            <h3 class="text-xl font-bold mb-2">提示</h3>
            <p id="customAlertMsg" class="text-slate-500 mb-6"></p>
            <button id="closeAlertBtn" class="w-full bg-indigo-600 text-white py-3 rounded-xl">了解</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 從全域變數獲取配置
        const firebaseConfigStr = typeof __firebase_config !== 'undefined' ? __firebase_config : '{}';
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'booking-app-v3';
        const authToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;

        const firebaseConfig = JSON.parse(firebaseConfigStr);

        // 如果沒有配置，則顯示錯誤
        if (!firebaseConfig.apiKey) {
            document.getElementById('slotsContainer').innerHTML = '<div class="col-span-2 py-8 text-center text-red-500">系統配置錯誤，請檢查 Firebase 設定。</div>';
        } else {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            let currentUser = null;
            let selectedSlot = null;
            let bookedSlotsMap = new Map();
            let allBookingsRaw = [];
            const ADMIN_PASSWORD = "admin123"; 

            const getBookingCollection = () => collection(db, 'artifacts', appId, 'public', 'data', 'bookings');
            const getBookingDocRef = (id) => doc(db, 'artifacts', appId, 'public', 'data', 'bookings', id);

            const datePicker = document.getElementById('bookingDate');
            datePicker.min = new Date().toISOString().split('T')[0];
            datePicker.value = datePicker.min;

            const showAlert = (msg) => {
                document.getElementById('customAlertMsg').innerText = msg;
                document.getElementById('customAlertModal').style.display = 'flex';
            };
            document.getElementById('closeAlertBtn').onclick = () => document.getElementById('customAlertModal').style.display = 'none';

            // Tab 切換與權限控管
            document.getElementById('tab-admin-btn').onclick = () => {
                document.getElementById('adminAuthModal').style.display = 'flex';
            };

            document.getElementById('cancelAuthBtn').onclick = () => document.getElementById('adminAuthModal').style.display = 'none';

            document.getElementById('confirmAuthBtn').onclick = () => {
                const pass = document.getElementById('adminPassInput').value;
                if (pass === ADMIN_PASSWORD) {
                    document.getElementById('adminAuthModal').style.display = 'none';
                    switchTab('admin');
                } else {
                    showAlert("密碼錯誤！");
                }
            };

            document.getElementById('tab-client-btn').onclick = () => switchTab('client');
            document.getElementById('logout-admin').onclick = () => switchTab('client');

            function switchTab(target) {
                if (target === 'client') {
                    document.getElementById('client-view').classList.remove('hidden');
                    document.getElementById('admin-view').classList.add('hidden');
                    document.getElementById('tab-client-btn').classList.add('tab-active');
                    document.getElementById('tab-admin-btn').classList.remove('tab-active');
                } else {
                    document.getElementById('client-view').classList.add('hidden');
                    document.getElementById('admin-view').classList.remove('hidden');
                    document.getElementById('tab-admin-btn').classList.add('tab-active');
                    document.getElementById('tab-client-btn').classList.remove('tab-active');
                }
            }

            // 安全初始化驗證
            const initAuth = async () => {
                try {
                    if (authToken) {
                        await signInWithCustomToken(auth, authToken);
                    } else {
                        await signInAnonymously(auth);
                    }
                } catch (error) {
                    console.error("Auth Error:", error);
                }
            };

            onAuthStateChanged(auth, (u) => {
                currentUser = u;
                if (u) {
                    // 只有在身份驗證完成後才開始監聽數據，防止 permission-denied
                    onSnapshot(getBookingCollection(), (snapshot) => {
                        bookedSlotsMap.clear();
                        allBookingsRaw = [];
                        snapshot.forEach(doc => {
                            const data = doc.data();
                            allBookingsRaw.push({ id: doc.id, ...data });
                            bookedSlotsMap.set(`${data.date}_${data.slot}`, data);
                        });
                        renderClientSlots();
                        renderMyBookings();
                        renderAdminList();
                    }, (error) => {
                        console.error("Snapshot error:", error);
                        if (error.code === 'permission-denied') {
                            console.warn("Retrying auth due to permission denied...");
                        }
                    });
                }
            });

            initAuth();

            function renderClientSlots() {
                const container = document.getElementById('slotsContainer');
                const targetDate = datePicker.value;
                container.innerHTML = '';
                const slots = ["09:00–10:00", "10:00–11:00", "11:00–12:00", "13:00–14:00", "14:00–15:00", "15:00–16:00", "16:00–17:00", "17:00–18:00"];
                
                slots.forEach(label => {
                    const isBooked = bookedSlotsMap.has(`${targetDate}_${label}`);
                    const btn = document.createElement('button');
                    btn.className = `time-slot p-4 bg-white border border-slate-200 rounded-2xl font-medium ${isBooked ? 'disabled' : 'hover:border-indigo-50'}`;
                    btn.innerText = isBooked ? `${label} (滿)` : label;
                    if (!isBooked) {
                        btn.onclick = () => {
                            document.querySelectorAll('.time-slot').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                            selectedSlot = label;
                            document.getElementById('confirmForm').classList.remove('hidden');
                        };
                    }
                    container.appendChild(btn);
                });
            }

            function renderMyBookings() {
                const container = document.getElementById('myBookingsList');
                const myItems = allBookingsRaw.filter(i => i.userId === currentUser?.uid && i.date === datePicker.value);
                document.getElementById('my-bookings-container').classList.toggle('hidden', myItems.length === 0);
                container.innerHTML = '';
                myItems.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "bg-white p-3 rounded-xl flex justify-between items-center shadow-sm border border-indigo-100";
                    div.innerHTML = `<span class="font-medium text-slate-700">${item.slot}</span><button class="text-red-500 text-xs font-bold px-2 py-1 rounded hover:bg-red-50" onclick="window.cancelBooking('${item.id}')">取消預約</button>`;
                    container.appendChild(div);
                });
            }

            function renderAdminList() {
                const container = document.getElementById('adminListContainer');
                container.innerHTML = '';
                document.getElementById('totalBookings').innerText = `${allBookingsRaw.length} 筆`;
                
                if (allBookingsRaw.length === 0) {
                    container.innerHTML = '<div class="text-center py-12 text-slate-400 italic">目前尚無預約資料</div>';
                    return;
                }

                allBookingsRaw.sort((a,b) => b.timestamp - a.timestamp).forEach(item => {
                    const div = document.createElement('div');
                    div.className = "p-4 border rounded-xl bg-slate-50 flex justify-between items-center";
                    div.innerHTML = `<div><div class="font-bold text-slate-800">${item.date} ${item.slot}</div><div class="text-xs text-slate-500">${item.userName} / ${item.userPhone}</div></div><button onclick="window.cancelBooking('${item.id}')" class="text-red-500 border border-red-200 px-3 py-1 rounded-lg hover:bg-red-100 transition-colors">刪除</button>`;
                    container.appendChild(div);
                });
            }

            window.cancelBooking = async (id) => {
                if(confirm("確定要移除此預約嗎？移除後名額將立即釋放。")) {
                    try {
                        await deleteDoc(getBookingDocRef(id));
                    } catch (e) {
                        showAlert("刪除失敗，請檢查權限設定。");
                    }
                }
            };

            document.getElementById('submitBtn').onclick = async () => {
                const name = document.getElementById('userName').value.trim();
                const phone = document.getElementById('userPhone').value.trim();
                if(!name || !phone || !selectedSlot) return showAlert("請填寫姓名與電話。");
                
                const btn = document.getElementById('submitBtn');
                btn.disabled = true;
                btn.innerText = "處理中...";

                try {
                    const id = `${datePicker.value}_${selectedSlot.replace(/[:–]/g,'')}`;
                    await setDoc(getBookingDocRef(id), {
                        date: datePicker.value, 
                        slot: selectedSlot, 
                        userName: name, 
                        userPhone: phone, 
                        userId: currentUser.uid, 
                        timestamp: Date.now()
                    });
                    document.getElementById('successMsg').innerText = `${datePicker.value} ${selectedSlot}`;
                    document.getElementById('successModal').style.display = 'flex';
                } catch (e) {
                    showAlert("預約失敗，請確保您已連網。");
                } finally {
                    btn.disabled = false;
                    btn.innerText = "立即預約";
                }
            };

            document.getElementById('closeModalBtn').onclick = () => {
                document.getElementById('successModal').style.display = 'none';
                document.getElementById('confirmForm').classList.add('hidden');
            };
            
            datePicker.onchange = renderClientSlots;
        }
    </script>
</body>
</html>
